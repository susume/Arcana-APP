<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcana - Tarot & Cartomancy Reading</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/onboarding.css">
  <link rel="stylesheet" href="css/reading.css">
  <link rel="stylesheet" href="css/settings.css">
</head>
<body>
  <div class="stars" id="stars"></div>
  <main id="app"></main>
  <template id="template-welcome">
<div class="screen active landing-screen" id="screen-welcome">
  <div class="landing-shell">
    <div class="landing-topbar">
      <div class="brand-lockup">
        <span class="logo-sym"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 1.5 13.61 8.12 19.42 4.58 15.88 10.39 22.5 12 15.88 13.61 19.42 19.42 13.61 15.88 12 22.5 10.39 15.88 4.58 19.42 8.12 13.61 1.5 12 8.12 10.39 4.58 4.58 10.39 8.12Z"></path></svg></span>
        <div>
          <h1>Arcana</h1>
          <p>Insight Through the Cards</p>
        </div>
      </div>
      <button class="icon-btn" onclick="openModal('modal-settings')" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3.2" y1="8" x2="20.8" y2="8"></line><line x1="3.2" y1="16" x2="20.8" y2="16"></line><circle cx="8" cy="8" r="2.6"></circle><circle cx="16" cy="16" r="2.6"></circle></svg>
      </button>
    </div>

    <div class="landing-command">
      <div class="landing-copy">
        <span class="plan-kicker" id="subscription-status">1 free reading left today</span>
        <h2>Insight through the cards</h2>
        <p>Reflect on relationships, decisions, career questions, and personal growth through guided AI-assisted readings.</p>
      </div>

      <div class="card-stage" aria-hidden="true">
        <div class="stage-card card-a"></div>
        <div class="stage-card card-b"></div>
        <div class="stage-card card-c"></div>
        <div class="stage-line"></div>
      </div>
    </div>

    <div class="landing-actions-panel">
      <button class="action-tile primary-action" onclick="startGuided()">
        <span class="tile-icon"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 1.6c.8 6 4.4 9.6 10.4 10.4-6 .8-9.6 4.4-10.4 10.4-.8-6-4.4-9.6-10.4-10.4 6-.8 9.6-4.4 10.4-10.4Z"></path></svg></span>
        <span><strong>Start Reading</strong><small>Guided card-by-card flow</small></span>
      </button>
      <button class="action-tile" onclick="startQuick()">
        <span class="tile-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="6.6" width="18" height="13" rx="2.6"></rect><circle cx="12" cy="13.1" r="3.4"></circle><path d="M8.4 6.6 9.6 4.4h4.8L15.6 6.6"></path></svg></span>
        <span><strong>Quick Upload</strong><small>For readers with a spread ready</small></span>
      </button>
      <button class="action-tile" onclick="goScreen('screen-history')" data-premium-feature="history">
        <span class="tile-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 6.4C10.4 5 7.6 4.5 4.6 5v13.4c3-.5 5.8 0 7.4 1.4M12 6.4c1.6-1.4 4.4-1.9 7.4-1.4v13.4c-3-.5-5.8 0-7.4 1.4M12 6.4V20"></path></svg></span>
        <span><strong>History</strong><small>Premium journal archive</small></span>
      </button>
    </div>

    <div class="plan-preview premium-strip">
      <div>
        <h3>Free</h3>
        <p>1 reading per day. Quick Insight, Standard Reading, Deep Exploration, AI interpretation, and a basic summary.</p>
      </div>
      <div>
        <h3>Premium</h3>
        <p>$4.99/month. Unlimited readings, history, narration, journal tools, advanced spreads, comparison, and priority AI processing.</p>
      </div>
    </div>

    <div class="footer-links">
      <span class="footer-link" onclick="openModal('modal-help')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M9.3 9.3a2.9 2.9 0 0 1 5.6.9c0 1.9-2.8 2.4-2.8 4.1"></path><circle cx="12" cy="17.4" r=".7" fill="currentColor" stroke="none"></circle></svg> Learn More</span>
    </div>
  </div>
</div>
</template>
  <template id="template-concerns">
<div class="screen" id="screen-concerns">
  <div class="step-dots" id="dots-concerns"></div>
  <h2 style="text-align:center;font-size:27px;font-weight:600;margin-bottom:8px;letter-spacing:.2px">Your Concerns</h2>
  <div class="onboard">
    What's weighing on your mind? A focus helps shape the reading, or <strong>skip this</strong> for open guidance.
  </div>
  <div id="concern-list">
    <div class="concern-row"><input type="text" placeholder="What's on your mind?" class="concern-input"><button class="btn btn-sm btn-danger" onclick="removeConcern(this)" title="Remove">&times;</button></div>
  </div>
  <button class="btn btn-sm" onclick="addConcern()" style="margin:8px 0">+ Add Another</button>
  <div class="tag-chips">
    <span class="tag-chip" onclick="tagConcern(this)">Love &amp; Relationships</span>
    <span class="tag-chip" onclick="tagConcern(this)">Career</span>
    <span class="tag-chip" onclick="tagConcern(this)">Family</span>
    <span class="tag-chip" onclick="tagConcern(this)">Personal Growth</span>
    <span class="tag-chip" onclick="tagConcern(this)">Finances</span>
    <span class="tag-chip" onclick="tagConcern(this)">Spiritual</span>
    <span class="tag-chip" onclick="tagConcern(this)">General Guidance</span>
  </div>
  <div class="nav-row">
    <button class="btn" onclick="goScreen('screen-welcome')">Back</button>
    <button class="btn btn-primary" onclick="saveConcerns()">Continue</button>
  </div>
</div>
</template>
  <template id="template-card-system">
<div class="screen" id="screen-card-system">
  <div class="step-dots" id="dots-system"></div>
  <h2 style="text-align:center;font-size:27px;font-weight:600;margin-bottom:8px;letter-spacing:.2px">Card System</h2>
  <div class="onboard">
    Which deck are you holding?
  </div>
  <div class="card-opt" onclick="selectSystem('tarot',this)">
    <h3>Traditional Tarot</h3>
    <p>78 cards: 22 Major Arcana and 56 Minor Arcana across Wands, Cups, Swords, and Pentacles.</p>
  </div>
  <div class="card-opt" onclick="selectSystem('playing',this)">
    <h3>Playing Cards</h3>
    <p>Standard 52-card deck: Hearts, Diamonds, Clubs, and Spades for classic cartomancy readings.</p>
  </div>
  <div class="card-opt" onclick="selectSystem('playing-joker',this)">
    <h3>Playing Cards + Joker</h3>
    <p>53 cards. The Joker represents unlimited potential, risk, and trust in the unknown.</p>
  </div>
  <div class="nav-row">
    <button class="btn" onclick="goScreen('screen-concerns')">Back</button>
    <button class="btn btn-primary" onclick="confirmSystem()">Continue</button>
  </div>
</div>
</template>
  <template id="template-choose-reading">
<div class="screen" id="screen-spread">
  <div class="step-dots" id="dots-spread"></div>
  <div class="progress-estimate" id="progress-spread"></div>
  <h2 style="text-align:center;font-size:27px;font-weight:600;margin-bottom:8px;letter-spacing:.2px">Choose Your Reading</h2>
  <div class="onboard compact-onboard">Free readings include Quick Insight, Standard Reading, and Deep Exploration. Advanced readings unlock with Premium.</div>
  <div class="context-panel">
    <div>
      <h3>Reading Context</h3>
      <p>Optional, but helpful. Life stage can change how a card should be interpreted.</p>
    </div>
    <div class="context-grid">
      <label>
        Life stage
        <select id="reader-life-stage">
          <option value="">Prefer not to say</option>
          <option>Child</option>
          <option>Teen</option>
          <option>Young adult</option>
          <option>Adult</option>
          <option>Older adult</option>
        </select>
      </label>
    </div>
    <p class="ai-disclaimer">Arcana uses AI for reflective guidance only. It is not medical, legal, financial, or mental-health advice, and it should not replace trusted human support or professional care.</p>
  </div>
  <div class="reading-choices" id="reading-choices">
    <div class="reading-choice-card" onclick="selectReadingType('one-card',this)">
      <div class="rc-header"><h3><span class="radio-mark"></span>Quick Insight</h3><span class="rc-cards">1 Card</span></div>
      <p>Fast guidance for a single question</p>
      <span class="rc-time">~1 minute</span>
    </div>
    <div class="reading-choice-card recommended" onclick="selectReadingType('three-card',this)">
      <div class="rc-header"><h3><span class="radio-mark"></span>Standard Reading <span class="star-mark">&#9733;</span></h3><span class="rc-cards">3 Cards</span></div>
      <span class="badge" style="margin-bottom:6px">Recommended</span>
      <p>Past, Present, Future</p>
      <span class="rc-time">~3 minutes</span>
    </div>
    <div class="reading-choice-card" onclick="selectReadingType('six-card',this)">
      <div class="rc-header"><h3><span class="radio-mark"></span>Deep Exploration</h3><span class="rc-cards">6 Cards</span></div>
      <p>Comprehensive insight into a situation</p>
      <span class="rc-time">~5 minutes</span>
    </div>
    <div class="advanced-readings-toggle" onclick="toggleAdvancedReadings()">
      <span id="adv-arrow">v</span> Advanced Readings <span class="premium-chip">Premium</span>
    </div>
    <div class="advanced-readings-panel" id="advanced-readings-panel" style="display:none">
      <div class="reading-choice-card compact" onclick="selectReadingType('celtic-cross',this)" data-premium-feature="advanced-spreads">
        <h3>Advanced Celtic Cross</h3><span class="rc-cards">10 Cards</span>
      </div>
      <div class="reading-choice-card compact" onclick="selectReadingType('romany',this)" data-premium-feature="advanced-spreads">
        <h3>Romany Spread</h3><span class="rc-cards">21 Cards</span>
      </div>
      <div class="reading-choice-card compact" onclick="selectReadingType('yearly',this)" data-premium-feature="advanced-spreads">
        <h3>Yearly Forecast</h3><span class="rc-cards">12 Cards</span>
      </div>
      <div class="reading-choice-card compact" onclick="selectReadingType('two-pathways',this)" data-premium-feature="advanced-spreads">
        <h3>Two Pathways</h3><span class="rc-cards">14 Cards</span>
      </div>
      <div class="reading-choice-card compact" onclick="selectReadingType('relationship',this)" data-premium-feature="advanced-spreads">
        <h3>Relationship Spread</h3><span class="rc-cards">15 Cards</span>
      </div>
    </div>
  </div>
  <div class="nav-row">
    <button class="btn" onclick="goScreen('screen-welcome')">Back</button>
    <button class="btn btn-primary" onclick="confirmSpread()">Continue</button>
  </div>
</div>
</template>
  <template id="template-reflection">
<div class="screen" id="screen-reflection">
  <div class="step-dots" id="dots-reflection"></div>
  <div class="progress-estimate" id="progress-reflection"></div>
  <div class="reflection-container">
    <div class="reflection-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="width:48px;height:48px;color:var(--au-violet)"><circle cx="12" cy="12" r="9"></circle><path d="M12 8v4l2 2"></path></svg>
    </div>
    <h2 style="text-align:center;font-size:24px;font-weight:600;margin:20px 0 12px;letter-spacing:.2px;font-family:var(--font-display)">Prepare Your Reading</h2>
    <div class="prepare-list">
      <p>Find a quiet space.</p>
      <p>Think about the situation you'd like insight into.</p>
      <p>Shuffle your deck while focusing on your question.</p>
      <p>Draw your cards and place them according to the spread.</p>
    </div>
    <div class="reflection-breathe">
      <div class="breathe-circle"></div>
      <span>Breathe and focus...</span>
    </div>
  </div>
  <div class="nav-row" style="margin-top:32px">
    <button class="btn" onclick="goScreen('screen-spread')">Back</button>
    <button class="btn btn-primary" onclick="confirmReflection()">Continue</button>
  </div>
</div>
</template>
  <template id="template-placement">
<div class="screen" id="screen-card-entry">
  <div class="step-dots" id="dots-entry"></div>
  <h2 style="text-align:center;font-size:27px;font-weight:600;margin-bottom:8px;letter-spacing:.2px">Lay Out Your Cards</h2>
  <div class="onboard compact-onboard">Use the visual guide to place each card by position. When your spread is ready, upload a clear photo from above or enter the cards manually.</div>

  <div class="dropped-card-section">
    <div class="toggle-row">
      <div class="toggle" id="drop-toggle" onclick="toggleDrop()"></div>
      <h4>Did a card fall out during shuffling?</h4>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:8px">A card that drops while shuffling can carry special significance. It may reveal an underlying theme or energy influencing your entire reading.</p>
    <div id="drop-card-entry" style="display:none">
      <div class="card-entry-row">
        <span class="pos-name">Dropped Card</span>
        <button class="card-pick-btn" onclick="openCardPicker('drop')" data-pos="drop">Choose card...</button>
        <div class="orient-btn" onclick="toggleOrient(this)" data-orient="upright" title="Click to toggle orientation">U</div>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('tab-guided',this)">Guided Draw</button>
    <button class="tab-btn" onclick="switchTab('tab-upload',this)">Upload Photo</button>
    <button class="tab-btn" onclick="switchTab('tab-manual',this)">Manual Entry</button>
  </div>

  <div id="tab-guided">
    <div class="onboard">
      Draw cards <strong>one at a time</strong>. The app guides each position. When finished, <strong>photograph your spread</strong> and AI identifies them.
    </div>
    <div id="guided-ritual-prompt"></div>
    <div id="guided-spread-diagram"></div>
    <div id="guided-actions" style="text-align:center;margin-top:12px"></div>
    <div id="guided-photo-section" style="display:none;margin-top:16px">
      <div class="divider" style="margin-bottom:16px"></div>
      <p style="text-align:center;color:var(--gold);font-family:var(--font-display);font-size:14px;margin-bottom:12px">All cards placed. Now photograph your spread.</p>
      <div class="upload-zone" id="guided-upload-zone" onclick="document.getElementById('guided-file-input').click()" ondragover="event.preventDefault();this.style.borderColor='var(--gold)'" ondragleave="this.style.borderColor=''" ondrop="handleGuidedDrop(event)">
        <p style="color:var(--muted)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="6.6" width="18" height="13" rx="2.6"></rect><circle cx="12" cy="13.1" r="3.4"></circle><path d="M8.4 6.6 9.6 4.4h4.8L15.6 6.6"></path></svg>Click or drag a photo of your completed spread<br><span style="font-size:11px">JPG, PNG, WEBP</span></p>
      </div>
      <input type="file" id="guided-file-input" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="handleGuidedUpload(this)">
      <button class="btn btn-primary" id="guided-identify-btn" style="display:none;width:100%;margin-top:8px" onclick="identifyGuidedCards()"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 1.6c.8 6 4.4 9.6 10.4 10.4-6 .8-9.6 4.4-10.4 10.4-.8-6-4.4-9.6-10.4-10.4 6-.8 9.6-4.4 10.4-10.4Z"></path></svg> Identify Cards with AI</button>
      <div id="guided-identify-results"></div>
      <p style="text-align:center;margin-top:12px"><span class="footer-link" onclick="switchTab('tab-manual',document.querySelectorAll('.tab-btn')[2])">Or enter cards manually</span></p>
    </div>
  </div>

  <div id="tab-upload" style="display:none">
    <div class="onboard">
      Take a clear photo from above. Ensure all cards are visible, and avoid shadows or glare.
    </div>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()" ondragover="event.preventDefault();this.style.borderColor='var(--gold)'" ondragleave="this.style.borderColor=''" ondrop="handleDrop(event)">
      <p style="color:var(--muted)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="6.6" width="18" height="13" rx="2.6"></rect><circle cx="12" cy="13.1" r="3.4"></circle><path d="M8.4 6.6 9.6 4.4h4.8L15.6 6.6"></path></svg>Click or drag a photo here<br><span style="font-size:11px">JPG, PNG, WEBP</span></p>
    </div>
    <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="handleUpload(this)">
    <button class="btn btn-primary" id="identify-btn" style="display:none;width:100%" onclick="identifyCards()"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 1.6c.8 6 4.4 9.6 10.4 10.4-6 .8-9.6 4.4-10.4 10.4-.8-6-4.4-9.6-10.4-10.4 6-.8 9.6-4.4 10.4-10.4Z"></path></svg> Identify Cards with AI</button>
    <div id="upload-results"></div>
  </div>

  <div id="tab-manual" style="display:none">
    <div class="onboard">
      Choose a card from the picker, then set each card <strong>upright</strong> or <strong>reversed</strong>.
    </div>
    <div class="suit-filter" id="suit-filter"></div>
    <div id="manual-entries"></div>
  </div>

  <div class="nav-row">
    <button class="btn" onclick="goScreen('screen-spread')">Back</button>
    <button class="btn btn-primary" onclick="confirmCards()">Review Cards</button>
  </div>
</div>
</template>
  <template id="template-overview">
<div class="screen" id="screen-overview">
  <div class="step-dots" id="dots-overview"></div>
  <h2 style="text-align:center;font-size:27px;font-weight:600;margin-bottom:8px;letter-spacing:.2px">Card Overview</h2>
  <div class="onboard">
    Your spread at a glance. Tap any card to edit before reading.
  </div>
  <div id="dropped-overview" style="display:none;margin-bottom:16px"></div>
  <div class="overview-grid" id="overview-grid"></div>
  <div class="nav-row">
    <button class="btn" onclick="goScreen('screen-card-entry')">Edit Cards</button>
    <button class="btn btn-primary" onclick="generateReading()"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 1.6c.8 6 4.4 9.6 10.4 10.4-6 .8-9.6 4.4-10.4 10.4-.8-6-4.4-9.6-10.4-10.4 6-.8 9.6-4.4 10.4-10.4Z"></path></svg> Generate Reading</button>
  </div>
</div>
</template>
  <template id="template-results">
<div class="screen" id="screen-reading">
  <div class="step-dots" id="dots-reading"></div>
  <h2 style="text-align:center;font-size:27px;font-weight:600;margin-bottom:8px;letter-spacing:.2px">Your Reading</h2>
  <div class="reading-toggle no-print">
    <button class="btn btn-sm" id="btn-ai-read" onclick="switchReadingMode('ai')"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 1.6c.8 6 4.4 9.6 10.4 10.4-6 .8-9.6 4.4-10.4 10.4-.8-6-4.4-9.6-10.4-10.4 6-.8 9.6-4.4 10.4-10.4Z"></path></svg> AI Reading</button>
    <button class="btn btn-sm" id="btn-classic-read" onclick="switchReadingMode('classic')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 6.4C10.4 5 7.6 4.5 4.6 5v13.4c3-.5 5.8 0 7.4 1.4M12 6.4c1.6-1.4 4.4-1.9 7.4-1.4v13.4c-3-.5-5.8 0-7.4 1.4M12 6.4V20"></path></svg> Classic Reading</button>
    <button class="btn btn-sm" onclick="narrateReading()" data-premium-feature="voice">Voice</button>
  </div>
  <div id="reading-content"></div>

  <div class="journal-section no-print" id="journal-section" data-premium-feature="journal">
    <div class="journal-prompt">Reflection</div>
    <p class="reflection-question">What stood out most to you?</p>
    <textarea id="journal-entry" class="journal-textarea" placeholder="Write your reflection here..."></textarea>
    <button class="btn btn-sm" onclick="saveJournal()" style="margin-top:8px">Save Reflection</button>
  </div>
  <div class="nav-row no-print" style="flex-wrap:wrap;gap:8px">
    <button class="btn" onclick="goScreen('screen-welcome')">New Reading</button>
    <button class="btn" onclick="shareReading()">Share</button>
    <button class="btn" onclick="printReading()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 9.5V4.2h10v5.3"></path><rect x="4.4" y="9.5" width="15.2" height="7.4" rx="1.6"></rect><rect x="7.4" y="14" width="9.2" height="5.4"></rect><circle cx="16.6" cy="12.2" r=".7" fill="currentColor" stroke="none"></circle></svg> Print</button>
    <button class="btn btn-primary" onclick="saveReading()" data-premium-feature="history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 4.5h10a1 1 0 0 1 1 1V20l-6-3.3L6 20V5.5a1 1 0 0 1 1-1Z"></path></svg> Save Reading</button>
  </div>
</div>
</template>
  <template id="template-history">
<div class="screen" id="screen-history">
  <h2 style="text-align:center;font-size:27px;font-weight:600;margin-bottom:8px;letter-spacing:.2px">Reading History</h2>
  <div class="onboard">
    Free history keeps your latest 3 readings on this device. Premium keeps the full reading history with journal notes and comparison.
  </div>
  <div id="history-list"></div>
  <div style="text-align:center;margin-top:16px">
    <button class="btn" onclick="goScreen('screen-welcome')">Back to Home</button>
  </div>
</div>
</template>
  <template id="template-quick">
<div class="screen" id="screen-quick">
  <h2 style="text-align:center;font-size:27px;font-weight:600;margin-bottom:8px;letter-spacing:.2px">Quick Reading</h2>
  <div class="onboard">
    Select your spread below, then upload a photo. AI reads each position with full context.
  </div>
  <input type="text" id="quick-concern" placeholder="Optional: what's on your mind?" style="margin-bottom:16px">
  <div class="context-panel quick-context">
    <div>
      <h3>Reading Context</h3>
      <p>Optional, but life stage helps Arcana interpret the cards appropriately.</p>
    </div>
    <div class="context-grid">
      <label>

    <h2>Guide</h2>
    <div class="help-section"><h3>What is Tarot?</h3><p>Tarot is a system of 78 cards used for reflection, insight, and guidance. It's not about predicting the future; it's a tool for exploring your thoughts, feelings, and possibilities.</p></div>
    <div class="help-section"><h3>Major &amp; Minor Arcana</h3><p>The 22 <strong>Major Arcana</strong> cards represent life's big themes and spiritual lessons, including The Fool, The Tower, and The Star. The 56 <strong>Minor Arcana</strong> cards deal with everyday situations across four suits.</p></div>
    <div class="help-section"><h3>Suits</h3><p><strong>Wands</strong> = passion, creativity, action. <strong>Cups</strong> = emotions, relationships, intuition. <strong>Swords</strong> = intellect, conflict, truth. <strong>Pentacles</strong> = material world, money, health.</p></div>
    <div class="help-section"><h3>Court Cards</h3><p><strong>Pages/Jacks</strong> = youth, messages, learning. <strong>Knights</strong> = action, movement, pursuit. <strong>Queens</strong> = maturity, nurturing, mastery. <strong>Kings</strong> = authority, leadership, responsibility.</p></div>
    <div class="help-section"><h3>Reversed Cards</h3><p>A reversed card appears upside-down. Its meaning is not necessarily bad; it often indicates blocked energy, internalized qualities, or the shadow side of the card's upright meaning.</p></div>
    <div class="help-section"><h3>Dropped Cards</h3><p>If a card falls out while you're shuffling, pay attention. Many readers believe these jumper cards carry a message your subconscious wants you to see. Arcana lets you record this card separately.</p></div>
    <div class="help-section"><h3>Spreads</h3><p>A spread is the layout pattern for your cards. Each position has a specific meaning: past, present, future, obstacle, advice, and more. The cards interact with each other through their positions.</p></div>
    <div class="help-section"><h3>AI vs Classic Readings</h3><p><strong>AI readings</strong> use Google Gemini to weave a personalized narrative. <strong>Classic readings</strong> use pre-written card meanings assembled into a structured interpretation, with no internet required.</p></div>
  </div>
</div>
