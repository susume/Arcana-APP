<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcana - Free AI Tarot Reading With Your Own Cards</title>
  <meta name="description" content="Arcana is a free AI tarot reading app for physical cards. Choose a spread, draw your own deck, upload a photo, identify cards with AI, and save your reflection.">
  <meta name="keywords" content="free tarot reading, AI tarot reading, online tarot reading, tarot spread, tarot card meanings, physical tarot deck, tarot journal">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/onboarding.css">
  <link rel="stylesheet" href="css/reading.css">
  <link rel="stylesheet" href="css/settings.css">
  <link rel="stylesheet" href="css/premium.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "SoftwareApplication",
        "name": "Arcana",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "Web",
        "description": "Arcana is an AI tarot reading app for physical cards. Users choose a spread, draw real cards, upload a spread photo, identify cards with AI, and save reflections in a tarot journal.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Free daily tarot reading",
          "AI card identification from spread photos",
          "Guided tarot spreads",
          "Classic offline tarot meanings",
          "Tarot journal and reading history"
        ]
      },
      {
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is Arcana?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Arcana is an AI tarot reading app for people using physical tarot or playing cards. It guides the spread, identifies cards from a photo, and creates a reflective interpretation."
            }
          },
          {
            "@type": "Question",
            "name": "How does an AI tarot reading work in Arcana?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "You choose a spread, draw real cards from your own deck, place them by position, upload a clear photo, and Arcana uses AI to identify the cards before generating a reading."
            }
          },
          {
            "@type": "Question",
            "name": "Is Arcana a random tarot card generator?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Arcana is designed for physical-card readings. Users shuffle and draw their own deck; the app supports interpretation, AI identification, and journaling."
            }
          }
        ]
      }
    ]
  }
  </script>
</head>
<body>
  <div class="stars" id="stars"></div>
  <main id="app"></main>
  <template id="template-welcome">
<div class="screen active landing-screen ritual-home" id="screen-welcome">

  <section class="ritual-journey" id="how-it-works" aria-labelledby="journey-title">
    <div class="ritual-section-heading">
      <h3 id="journey-title">Your Reading Journey</h3>
      <p>Ancient ritual. Modern insight. A simple, sacred process for the cards already in your hands.</p>
    </div>
    <div class="journey-steps">
      <div class="journey-step">
        <span class="journey-number">1</span>
        <div class="journey-visual" aria-hidden="true"><img src="assets/homepage/reference-crops/journey-choose-spread.png" alt=""></div>

        <p>Pick the layout that fits your question, from a daily card to deeper exploration.</p>

        <h4>Draw Your Cards</h4>
        <p>Shuffle, focus, and place real cards from your own deck into each position.</p>
      </div>
      <div class="journey-step">
        <span class="journey-number">3</span>
        <div class="journey-visual" aria-hidden="true"><img src="assets/homepage/reference-crops/journey-upload-photo.png" alt=""></div>
        <h4>Upload a Photo</h4>
        <p>Snap a clear image of the spread so Arcana can identify each card by position.</p>

      <div class="journey-step">
        <span class="journey-number">4</span>
        <div class="journey-visual" aria-hidden="true"><img src="assets/homepage/reference-crops/journey-ai-insight.png" alt=""></div>

        <p>Receive a reflective interpretation shaped by your cards, context, and spread.</p>

  <section class="ritual-comparison" aria-labelledby="comparison-title">
    <div class="ritual-section-heading">
      <h3 id="comparison-title">Real Cards. Real Connection.</h3>
      <p>Arcana Guide is built for readers who value authenticity and depth.</p>
    </div>
    <div class="comparison-grid">
      <div class="comparison-panel comparison-good">
        <span class="comparison-mark" aria-hidden="true">+</span>
        <img class="comparison-card-image" src="assets/homepage/reference-crops/comparison-real-card.png" alt="" aria-hidden="true">
        <h4>Real Cards With Arcana Guide</h4>
        <ul>
          <li>Your energy and intention stay in the spread.</li>
          <li>The reading reflects the cards you actually drew.</li>
          <li>AI interprets position, context, and meaning together.</li>
          <li>You can save reflections and revisit patterns over time.</li>
        </ul>
      </div>
      <div class="comparison-panel comparison-muted">
        <span class="comparison-mark" aria-hidden="true">-</span>
        <img class="comparison-card-image" src="assets/homepage/reference-crops/comparison-random-cards.png" alt="" aria-hidden="true">
        <h4>Random Generators</h4>
        <ul>
          <li>No physical ritual or personal deck connection.</li>
          <li>Surface-level results from an automatic draw.</li>
          <li>Less context around your actual question.</li>
          <li>Harder to turn the message into reflection.</li>
        </ul>
      </div>
    </div>
  </section>

  <section class="ritual-journal-premium" id="journal" aria-labelledby="journal-title">

      <img src="assets/homepage/reference-crops/journal-book-reference.png" alt="">

      <div class="premium-benefits">
        <div>
          <span class="benefit-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.4C10.4 5 7.6 4.5 4.6 5v13.4c3-.5 5.8 0 7.4 1.4M12 6.4c1.6-1.4 4.4-1.9 7.4-1.4v13.4c-3-.5-5.8 0-7.4 1.4M12 6.4V20"></path></svg></span>

          <p>Capture reflections and track the themes that return again and again.</p>
        </div>
        <div>
          <span class="benefit-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m4 8 4 4 4-7 4 7 4-4v10H4Z"></path><path d="M4 18h16"></path></svg></span>
          <h4>Premium Spreads</h4>
          <p>Unlock advanced readings, narration, comparison tools, and your full archive.</p>

      </div>
      <button class="btn ritual-journal-cta" onclick="goScreen('screen-history')" data-premium-feature="history">Open Tarot Journal</button>
    </div>
  </section>

  <section class="ritual-final-cta" aria-labelledby="final-cta-title">
    <h3 id="final-cta-title">Your Cards Have A Story. Let AI Help You Read It.</h3>
    <div class="hero-cta-row ritual-cta-row">
      <button class="btn btn-primary ritual-primary-cta" onclick="startGuided()">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 1.6c.8 6 4.4 9.6 10.4 10.4-6 .8-9.6 4.4-10.4 10.4-.8-6-4.4-9.6-10.4-10.4 6-.8 9.6-4.4 10.4-10.4Z"></path></svg>

      <button class="btn ritual-secondary-cta" onclick="startQuick()">

        Upload a Spread
      </button>

  <div class="footer-links ritual-footer">
    <span class="footer-link" onclick="openModal('modal-help')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M9.3 9.3a2.9 2.9 0 0 1 5.6.9c0 1.9-2.8 2.4-2.8 4.1"></path><circle cx="12" cy="17.4" r=".7" fill="currentColor" stroke="none"></circle></svg> Learn More</span>
  </div>

  <template id="template-concerns">
<div class="screen ritual-screen ritual-screen-focus" id="screen-concerns">
  <div class="step-dots" id="dots-concerns"></div>
  <h2 style="text-align:center;font-size:27px;font-weight:600;margin-bottom:8px;letter-spacing:.2px">What question should your tarot reading explore?</h2>
  <div class="onboard">
    A clear focus helps Arcana interpret the cards in context. You can name a relationship, decision, career question, or emotional pattern, or skip this for open guidance.
  </div>
  <div id="concern-list">
    <div class="concern-row"><input type="text" placeholder="What question or situation is on your mind?" class="concern-input"><button class="btn btn-sm btn-danger" onclick="removeConcern(this)" title="Remove">&times;</button></div>
  </div>
  <button class="btn btn-sm" onclick="addConcern()" style="margin:8px 0">Add Another Focus</button>
  <div class="tag-chips">
    <button type="button" class="tag-chip" onclick="tagConcern(this)">Love &amp; Relationships</button>
    <button type="button" class="tag-chip" onclick="tagConcern(this)">Career</button>
    <button type="button" class="tag-chip" onclick="tagConcern(this)">Family</button>
    <button type="button" class="tag-chip" onclick="tagConcern(this)">Personal Growth</button>
    <button type="button" class="tag-chip" onclick="tagConcern(this)">Finances</button>
    <button type="button" class="tag-chip" onclick="tagConcern(this)">Spiritual</button>
    <button type="button" class="tag-chip" onclick="tagConcern(this)">General Guidance</button>
  </div>
  <div class="nav-row">
    <button class="btn" onclick="goScreen('screen-welcome')">Back</button>
    <button class="btn btn-primary" onclick="saveConcerns()">Continue</button>
  </div>
</div>
</template>
  <template id="template-card-system">
<div class="screen ritual-screen ritual-screen-choice" id="screen-card-system">
  <div class="step-dots" id="dots-system"></div>
  <h2 style="text-align:center;font-size:27px;font-weight:600;margin-bottom:8px;letter-spacing:.2px">Which deck are you reading with?</h2>
  <div class="onboard">
    Arcana can interpret traditional tarot cards or playing cards used for cartomancy. Choose the deck in your hands so card meanings and suits match your reading.
  </div>
  <button type="button" class="card-opt" onclick="selectSystem('tarot',this)">
    <h3>Traditional Tarot</h3>
    <p>Use this for a 78-card tarot deck with 22 Major Arcana and 56 Minor Arcana across Wands, Cups, Swords, and Pentacles.</p>
  </button>
  <button type="button" class="card-opt" onclick="selectSystem('playing',this)">
    <h3>Playing Cards</h3>
    <p>Use this for a standard 52-card deck. Arcana reads Hearts, Diamonds, Clubs, and Spades through classic cartomancy meanings.</p>
  </button>
  <button type="button" class="card-opt" onclick="selectSystem('playing-joker',this)">
    <h3>Playing Cards + Joker</h3>
    <p>Use this for a 53-card deck. The Joker adds themes of possibility, risk, surprise, and trust in the unknown.</p>
  </button>
  <div class="nav-row">
    <button class="btn" onclick="goScreen('screen-concerns')">Back</button>
    <button class="btn btn-primary" onclick="confirmSystem()">Continue</button>
  </div>
</div>
</template>
  <template id="template-choose-reading">
<div class="screen ritual-screen ritual-screen-choice" id="screen-spread">
  <div class="step-dots" id="dots-spread"></div>
  <div class="progress-estimate" id="progress-spread"></div>
  <h2 style="text-align:center;font-size:27px;font-weight:600;margin-bottom:8px;letter-spacing:.2px">Which tarot spread should you use?</h2>
  <div class="onboard compact-onboard">Choose the smallest spread that can answer your question. One card is best for a daily focus, three cards give simple context, and six cards explore a situation in more depth.</div>
  <div class="context-panel">
    <div>
      <h3>What context helps a tarot reading?</h3>
      <p>Life stage is optional, but it helps Arcana phrase the interpretation with appropriate care and perspective.</p>
    </div>
    <div class="context-grid">
      <label>
        Life stage
        <select id="reader-life-stage">
          <option value="">Prefer not to say</option>
          <option>Child</option>
          <option>Teen</option>
          <option>Young adult</option>
          <option>Adult</option>
          <option>Older adult</option>
        </select>
      </label>
    </div>
    <p class="ai-disclaimer">Arcana uses AI for reflective guidance only. It is not medical, legal, financial, or mental-health advice, and it should not replace trusted human support or professional care.</p>
  </div>
  <div class="reading-choices" id="reading-choices">
    <button type="button" class="reading-choice-card" onclick="selectReadingType('one-card',this)">
      <div class="rc-header"><h3><span class="radio-mark"></span>Quick Insight</h3><span class="rc-cards">1 Card</span></div>
      <p>Best for a daily tarot reading, a simple yes-or-no feeling, or one clear question.</p>
      <span class="rc-time">~1 minute</span>
    </button>
    <button type="button" class="reading-choice-card recommended" onclick="selectReadingType('three-card',this)">
      <div class="rc-header"><h3><span class="radio-mark"></span>Standard Reading <span class="star-mark">&#9733;</span></h3><span class="rc-cards">3 Cards</span></div>
      <span class="badge" style="margin-bottom:6px">Recommended</span>
      <p>Best for understanding past influences, present energy, and the likely direction of a situation.</p>
      <span class="rc-time">~3 minutes</span>
    </button>
    <button type="button" class="reading-choice-card" onclick="selectReadingType('six-card',this)">
      <div class="rc-header"><h3><span class="radio-mark"></span>Deep Exploration</h3><span class="rc-cards">6 Cards</span></div>
      <p>Best when a relationship, career question, or life decision needs more nuance.</p>
      <span class="rc-time">~5 minutes</span>
    </button>
    <button type="button" class="advanced-readings-toggle" onclick="toggleAdvancedReadings()">
      <span id="adv-arrow">v</span> Advanced Readings <span class="premium-chip">Premium</span>
    </button>
    <div class="advanced-readings-panel" id="advanced-readings-panel" style="display:none">
      <button type="button" class="reading-choice-card compact" onclick="selectReadingType('celtic-cross',this)" data-premium-feature="advanced-spreads">
        <h3>Advanced Celtic Cross</h3><span class="rc-cards">10 Cards</span>
      </button>
      <button type="button" class="reading-choice-card compact" onclick="selectReadingType('romany',this)" data-premium-feature="advanced-spreads">
        <h3>Romany Spread</h3><span class="rc-cards">21 Cards</span>
      </button>
      <button type="button" class="reading-choice-card compact" onclick="selectReadingType('yearly',this)" data-premium-feature="advanced-spreads">
        <h3>Yearly Forecast</h3><span class="rc-cards">12 Cards</span>
      </button>
      <button type="button" class="reading-choice-card compact" onclick="selectReadingType('two-pathways',this)" data-premium-feature="advanced-spreads">
        <h3>Two Pathways</h3><span class="rc-cards">14 Cards</span>
      </button>
      <button type="button" class="reading-choice-card compact" onclick="selectReadingType('relationship',this)" data-premium-feature="advanced-spreads">
        <h3>Relationship Spread</h3><span class="rc-cards">15 Cards</span>
      </button>
    </div>
  </div>
  <div class="nav-row">
    <button class="btn" onclick="goScreen('screen-welcome')">Back</button>
    <button class="btn btn-primary" onclick="confirmSpread()">Continue</button>
  </div>
</div>
</template>
  <template id="template-reflection">
<div class="screen ritual-screen ritual-screen-focus" id="screen-reflection">
  <div class="step-dots" id="dots-reflection"></div>
  <div class="progress-estimate" id="progress-reflection"></div>
  <div class="reflection-container">
    <div class="reflection-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="width:48px;height:48px;color:var(--au-violet)"><circle cx="12" cy="12" r="9"></circle><path d="M12 8v4l2 2"></path></svg>
    </div>
    <h2 style="text-align:center;font-size:24px;font-weight:600;margin:20px 0 12px;letter-spacing:.2px;font-family:var(--font-display)">How should you prepare for a tarot reading?</h2>
    <div class="prepare-list">
      <p>Start by choosing one question or situation you want the cards to reflect back.</p>
      <p>Find a quiet place where you can shuffle, draw, and photograph your spread clearly.</p>
      <p>Shuffle your deck while holding the question in mind; the wording can be simple.</p>
      <p>Draw your cards and place them in the spread positions shown in the next step.</p>
    </div>
    <div class="reflection-breathe">
      <div class="breathe-circle"></div>
      <span>Breathe, ask, and shuffle...</span>
    </div>
  </div>
  <div class="nav-row" style="margin-top:32px">
    <button class="btn" onclick="goScreen('screen-spread')">Back</button>
    <button class="btn btn-primary" onclick="confirmReflection()">Continue</button>
  </div>
</div>
</template>
  <template id="template-placement">
<div class="screen ritual-screen ritual-screen-workspace" id="screen-card-entry">
  <div class="step-dots" id="dots-entry"></div>
  <h2 style="text-align:center;font-size:27px;font-weight:600;margin-bottom:8px;letter-spacing:.2px">How do you lay out a tarot spread?</h2>
  <div class="onboard compact-onboard">Place one real card in each position shown below. When the spread is complete, upload a clear photo from above so Arcana can identify the cards, or enter them manually.</div>

  <div class="dropped-card-section">
    <div class="toggle-row">
      <button type="button" class="toggle" id="drop-toggle" onclick="toggleDrop()" aria-pressed="false" aria-label="Add a dropped or jumper card"></button>
      <h4>Did a card fall out while you shuffled?</h4>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-bottom:8px">A dropped or jumper card can be recorded as an extra message. Many readers treat it as an underlying theme rather than part of the main spread.</p>
    <div id="drop-card-entry" style="display:none">
      <div class="card-entry-row">
        <span class="pos-name">Dropped Card</span>
        <button class="card-pick-btn" onclick="openCardPicker('drop')" data-pos="drop">Choose card...</button>
        <button type="button" class="orient-btn" onclick="toggleOrient(this)" data-orient="upright" data-pos="drop" aria-pressed="false" aria-label="Card orientation: upright. Activate to mark reversed." title="Card orientation: upright">U</button>
      </div>
    </div>
  </div>

  <div class="tab-bar">

<div class="modal-overlay" id="modal-help">
  <div class="modal ritual-modal ritual-help-modal">
    <button class="close-btn" onclick="closeModal('modal-help')">&times;</button>
    <h2>Tarot Reading Guide</h2>
    <div class="help-section"><h3>What is tarot?</h3><p>Tarot is a 78-card symbolic system used for reflection, insight, and guidance. A tarot reading does not need to predict a fixed future; it helps you examine a question, notice patterns, and consider possible next steps.</p></div>
    <div class="help-section"><h3>How does Arcana create an AI tarot reading?</h3><p>Arcana reads the spread you create with your own cards. You choose a spread, draw and place real cards, upload a photo or enter the cards manually, then receive an interpretation based on each card and its position.</p></div>
    <div class="help-section"><h3>What are the Major and Minor Arcana?</h3><p>The 22 <strong>Major Arcana</strong> cards represent major life themes, turning points, and lessons. The 56 <strong>Minor Arcana</strong> cards describe everyday situations through four suits: Wands, Cups, Swords, and Pentacles.</p></div>
    <div class="help-section"><h3>What do the tarot suits mean?</h3><p><strong>Wands</strong> often point to action, creativity, and ambition. <strong>Cups</strong> relate to emotion, intuition, and relationships. <strong>Swords</strong> explore thought, truth, conflict, and clarity. <strong>Pentacles</strong> connect to work, money, body, home, and material life.</p></div>
    <div class="help-section"><h3>What do court cards mean in tarot?</h3><p>Court cards often describe a person, role, attitude, or stage of growth. <strong>Pages</strong> suggest learning and messages, <strong>Knights</strong> suggest movement, <strong>Queens</strong> suggest inner mastery, and <strong>Kings</strong> suggest leadership or responsibility.</p></div>
    <div class="help-section"><h3>What does a reversed tarot card mean?</h3><p>A reversed card appears upside-down and usually points to blocked, delayed, internalized, or shadow-side energy. It is not automatically negative; it adds nuance to the card's upright meaning.</p></div>
    <div class="help-section"><h3>What is a dropped or jumper card?</h3><p>A dropped card is a card that falls out while shuffling. Many readers treat it as an extra message or underlying theme, so Arcana lets you record it separately from the main spread.</p></div>
    <div class="help-section"><h3>Which tarot spread should beginners choose?</h3><p>Beginners should start with one card for a daily focus or three cards for past, present, and future. Larger spreads are better when you already have a clear question and want more detail.</p></div>
    <div class="help-section"><h3>What is the difference between AI and classic readings?</h3><p><strong>AI readings</strong> use Google Gemini to create a personalized narrative from your cards, spread positions, and optional context. <strong>Classic readings</strong> use built-in card meanings and work offline without an API key.</p></div>
    <div class="help-section" id="gemini-key-guide">
      <h3>How to get a free Gemini API key</h3>
      <ol>
        <li>Go to <a href="https://aistudio.google.com" target="_blank" rel="noopener noreferrer">Google AI Studio</a>.</li>
        <li>Log in with your standard Google or Gmail account.</li>
        <li>Open API keys and click the prominent "Create API Key" button.</li>
        <li>Select "Create API key in a new project."</li>
        <li>Copy the generated key.</li>
        <li>Keep it secret and never share it.</li>
        <li>Return to Arcana, open Settings, and paste the key into AI Configuration.</li>
      </ol>
      <p>Google may adjust button labels over time. If a key is ever exposed, return to Google AI Studio and revoke it.</p>
    </div>
  </div>
</div>
</template>
