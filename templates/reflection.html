<div class="screen" id="screen-reflection">
  <div class="step-dots" id="dots-reflection"></div>
  <div class="progress-estimate" id="progress-reflection"></div>
  <div class="reflection-container">
    <div class="reflection-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="width:48px;height:48px;color:var(--au-violet)"><circle cx="12" cy="12" r="9"></circle><path d="M12 8v4l2 2"></path></svg>
    </div>
    <h2 style="text-align:center;font-size:24px;font-weight:600;margin:20px 0 12px;letter-spacing:.2px;font-family:var(--font-display)">Prepare Your Reading</h2>
    <div class="prepare-list">
      <p>Find a quiet space.</p>
      <p>Think about the situation you'd like insight into.</p>
      <p>Shuffle your deck while focusing on your question.</p>
      <p>Draw your cards and place them according to the spread.</p>
    </div>
    <div class="reflection-breathe">
      <div class="breathe-circle"></div>
      <span>Breathe and focus...</span>
    </div>
  </div>
  <div class="nav-row" style="margin-top:32px">
    <button class="btn" onclick="goScreen('screen-spread')">Back</button>
    <button class="btn btn-primary" onclick="confirmReflection()">Continue</button>
  </div>
</div>
