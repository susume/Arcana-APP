<div class="screen" id="screen-reading">
  <div class="step-dots" id="dots-reading"></div>
  <h2 style="text-align:center;font-size:27px;font-weight:600;margin-bottom:8px;letter-spacing:.2px">Your Reading</h2>
  <div class="reading-toggle no-print">
    <button class="btn btn-sm" id="btn-ai-read" onclick="switchReadingMode('ai')"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 1.6c.8 6 4.4 9.6 10.4 10.4-6 .8-9.6 4.4-10.4 10.4-.8-6-4.4-9.6-10.4-10.4 6-.8 9.6-4.4 10.4-10.4Z"></path></svg> AI Reading</button>
    <button class="btn btn-sm" id="btn-classic-read" onclick="switchReadingMode('classic')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 6.4C10.4 5 7.6 4.5 4.6 5v13.4c3-.5 5.8 0 7.4 1.4M12 6.4c1.6-1.4 4.4-1.9 7.4-1.4v13.4c-3-.5-5.8 0-7.4 1.4M12 6.4V20"></path></svg> Classic Reading</button>
    <button class="btn btn-sm" onclick="narrateReading()" data-premium-feature="voice">Voice</button>
  </div>
  <div id="reading-content"></div>

  <div class="journal-section no-print" id="journal-section" data-premium-feature="journal">
    <div class="journal-prompt">Reflection</div>
    <p class="reflection-question">What stood out most to you?</p>
    <textarea id="journal-entry" class="journal-textarea" placeholder="Write your reflection here..."></textarea>
    <button class="btn btn-sm" onclick="saveJournal()" style="margin-top:8px">Save Reflection</button>
  </div>
  <div class="nav-row no-print" style="flex-wrap:wrap;gap:8px">
    <button class="btn" onclick="goScreen('screen-welcome')">New Reading</button>
    <button class="btn" onclick="shareReading()">Share</button>
    <button class="btn" onclick="printReading()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 9.5V4.2h10v5.3"></path><rect x="4.4" y="9.5" width="15.2" height="7.4" rx="1.6"></rect><rect x="7.4" y="14" width="9.2" height="5.4"></rect><circle cx="16.6" cy="12.2" r=".7" fill="currentColor" stroke="none"></circle></svg> Print</button>
    <button class="btn btn-primary" onclick="saveReading()" data-premium-feature="history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 4.5h10a1 1 0 0 1 1 1V20l-6-3.3L6 20V5.5a1 1 0 0 1 1-1Z"></path></svg> Save Reading</button>
  </div>
</div>
