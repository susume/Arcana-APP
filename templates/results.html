<div class="screen" id="screen-reading">
  <div class="step-dots" id="dots-reading"></div>
  <h2 style="text-align:center;font-size:27px;font-weight:600;margin-bottom:8px;letter-spacing:.2px">Your tarot reading</h2>
  <div class="reading-toggle no-print">
    <button class="btn btn-sm" id="btn-ai-read" onclick="switchReadingMode('ai')"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 1.6c.8 6 4.4 9.6 10.4 10.4-6 .8-9.6 4.4-10.4 10.4-.8-6-4.4-9.6-10.4-10.4 6-.8 9.6-4.4 10.4-10.4Z"></path></svg> AI Reading</button>
    <button class="btn btn-sm" id="btn-classic-read" onclick="switchReadingMode('classic')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 6.4C10.4 5 7.6 4.5 4.6 5v13.4c3-.5 5.8 0 7.4 1.4M12 6.4c1.6-1.4 4.4-1.9 7.4-1.4v13.4c-3-.5-5.8 0-7.4 1.4M12 6.4V20"></path></svg> Classic Reading</button>
    <button class="btn btn-sm" onclick="narrateReading()" data-premium-feature="voice">Voice</button>
  </div>
  <div id="reading-content"></div>

  <div class="journal-section no-print" id="journal-section" data-premium-feature="journal">
    <div class="journal-orbit" aria-hidden="true"></div>
    <div class="journal-topline">
      <span class="journal-badge">Premium Journal</span>
      <span class="journal-moon" aria-hidden="true"></span>
    </div>
    <div class="journal-prompt">Reflection</div>
    <p class="reflection-question">Before the moment passes, write down the message you want to remember.</p>
    <div class="reflection-chips" aria-label="Reflection prompts">
      <button type="button" onclick="useReflectionPrompt(this)">What surprised me?</button>
      <button type="button" onclick="useReflectionPrompt(this)">Which card keeps echoing?</button>
      <button type="button" onclick="useReflectionPrompt(this)">What action will I take?</button>
    </div>
    <textarea id="journal-entry" class="journal-textarea" placeholder="I want to remember..."></textarea>
    <div class="journal-actions">
      <button class="btn btn-primary journal-save-btn" onclick="saveJournal()" disabled>Save Reflection</button>
      <span class="journal-save-status" aria-live="polite"></span>
    </div>
  </div>
  <div class="reading-actions no-print">
    <button class="btn btn-primary save-reading-action" onclick="saveReading()" data-premium-feature="history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 4.5h10a1 1 0 0 1 1 1V20l-6-3.3L6 20V5.5a1 1 0 0 1 1-1Z"></path></svg> Save Reading</button>
    <div class="reading-actions-secondary">
      <button class="btn" onclick="shareReading()">Share</button>
      <button class="btn" onclick="printReading()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 9.5V4.2h10v5.3"></path><rect x="4.4" y="9.5" width="15.2" height="7.4" rx="1.6"></rect><rect x="7.4" y="14" width="9.2" height="5.4"></rect><circle cx="16.6" cy="12.2" r=".7" fill="currentColor" stroke="none"></circle></svg> Print</button>
      <button class="btn" onclick="goScreen('screen-welcome')">Start Again</button>
    </div>
  </div>
</div>
