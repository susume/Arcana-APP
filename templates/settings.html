<div class="modal-overlay" id="modal-settings">
  <div class="modal">
    <button class="close-btn" onclick="closeModal('modal-settings')">&times;</button>
    <h2>Settings</h2>

    <div class="settings-section">
      <h3>Subscription</h3>
      <p id="premium-settings-status" class="settings-status">Free plan active</p>
      <label>Activation Key</label>
      <input type="text" id="premium-key-input" placeholder="Enter premium activation key">
      <p id="premium-key-status" class="activation-status"></p>
      <button class="btn btn-sm" onclick="deactivatePremium();renderEntitlementsUI();showToast('Premium deactivated on this device.')">Deactivate Premium</button>
    </div>

    <label>Reading Style</label>
    <select id="reading-style">
      <option>Traditional</option><option>Psychological</option><option>Spiritual</option><option>Practical</option><option>Shadow Work</option>
    </select>
    <label>Reading Tone</label>
    <select id="reading-tone">
      <option>Gentle</option><option>Neutral</option><option>Direct</option><option>Mystical</option>
    </select>
    <div style="margin-top:20px;padding-top:12px;border-top:1px solid var(--border)">
      <button class="btn btn-sm btn-danger" onclick="if(confirm('Delete saved readings and settings?')){localStorage.removeItem('arcana_readings');localStorage.removeItem('arcana_settings');location.reload()}">Clear Saved Data</button>
    </div>
    <div style="margin-top:12px;text-align:right">
      <button class="btn btn-primary btn-sm" onclick="saveSettings()">Save Settings</button>
    </div>
  </div>
</div>
